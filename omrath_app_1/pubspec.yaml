name: omrath_app

description: Omrath Travels App

publish_to: 'none'

version: 1.0.0+1

environment:
  # sdk: ">=3.0.0 <4.0.0"
  sdk: ^3.11.5


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.0
  flutter_svg: ^2.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.4

  # flutter_native_splash: ^2.4.7


flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/images/
    - assets/images/home/
    - assets/images/splash/


  # flutter_native_splash:
  #   color: "#FFF4EA"
  #   image: assets/images/splash.png

  #   android_12:
  #     color: "#FFF4EA"
  #     image: assets/images/splash.png

#   android: true
#   ios: true

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/icon/app_icon.png"

  adaptive_icon_background: "#F3ECE4"
  adaptive_icon_foreground: "assets/icon/app_icon.png"